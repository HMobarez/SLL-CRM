async function handleDailyImport(input){
  const file = input.files[0];
  if(!file) return;
  if(!supa){showToast("❌","لا يوجد اتصال"); return;}
  const statusEl = $("daily-import-status");
  if(statusEl) statusEl.innerHTML = '<div style="background:var(--orange-bg);border:1px solid rgba(245,146,74,.3);border-radius:6px;padding:10px;font-size:12px">⏳ جاري قراءة الملف...</div>';

  const reader = new FileReader();
  reader.onload = async function(e){
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type: "array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval: ""});
      if(!rows.length){
        if(statusEl) statusEl.innerHTML = '<div style="background:var(--red-bg);color:var(--red2);padding:10px;border-radius:6px">❌ الملف فارغ</div>';
        return;
      }

      const upserts = [];
      let skipped = 0;
      let coordsNotFound = new Set();

      for(const row of rows){
        let dateVal = row["Date"] || row["date"] || row["التاريخ"];
        const coordName = String(row["Coordinator"] || row["coordinator"] || row["الكوردينتور"] || "").trim();

        if(!dateVal || !coordName){skipped++; continue;}

        // Normalize date
        if(dateVal instanceof Date){
          dateVal = dateVal.toISOString().slice(0,10);
        } else {
          dateVal = String(dateVal).trim();
          // Try to parse various formats
          if(!/^\d{4}-\d{2}-\d{2}$/.test(dateVal)){
            const d = new Date(dateVal);
            if(isNaN(d.getTime())){skipped++; continue;}
            dateVal = d.toISOString().slice(0,10);
          }
        }

        // Find coordinator
        const coord = COORD_USERS.find(c => c.name.toLowerCase() === coordName.toLowerCase());
        if(!coord){
          coordsNotFound.add(coordName);
          skipped++;
          continue;
        }

        // For each channel column
        DD.source.forEach(ch => {
          const v = row[ch];
          if(v === "" || v === null || v === undefined) return;
          const val = parseInt(v);
          if(isNaN(val) || val < 0) return;
          upserts.push({
            coord_id: coord.id,
            coord_name: coord.name,
            date: dateVal,
            channel: ch,
            count: val
          });
        });
      }

      if(upserts.length === 0){
        if(statusEl) statusEl.innerHTML = '<div style="background:var(--red-bg);color:var(--red2);padding:10px;border-radius:6px">❌ لا يوجد قيم صالحة. تم تخطي '+skipped+' صف'+(coordsNotFound.size?'<br>كوردينتوريين غير معروفين: '+[...coordsNotFound].join(", "):"")+'</div>';
        input.value = "";
        return;
      }

      // Upsert in batches of 500
      let saved = 0;
      const batchSize = 500;
      for(let i = 0; i < upserts.length; i += batchSize){
        const batch = upserts.slice(i, i+batchSize);
        const {error} = await supa.from("daily_contacted").upsert(batch, {onConflict: "coord_id,date,channel"});
        if(error) throw error;
        saved += batch.length;
        if(statusEl) statusEl.innerHTML = '<div style="background:var(--blue-bg);color:var(--blue2);padding:10px;border-radius:6px">⏳ تم حفظ '+saved+' / '+upserts.length+'...</div>';
      }

      // Update local state
      if(!MC.dailyByChannel) MC.dailyByChannel = {};
      upserts.forEach(u => {
        if(!MC.dailyByChannel[u.coord_name]) MC.dailyByChannel[u.coord_name] = {};
        if(!MC.dailyByChannel[u.coord_name][u.date]) MC.dailyByChannel[u.coord_name][u.date] = {};
        MC.dailyByChannel[u.coord_name][u.date][u.channel] = u.count;
      });

      let msg = '<div style="background:var(--green-bg);color:var(--green2);padding:12px;border-radius:6px"><div style="font-weight:700;margin-bottom:4px">✅ تم الاستيراد بنجاح</div>';
      msg += '<div style="font-size:11px">تم حفظ '+saved+' قيمة';
      if(skipped > 0) msg += ' · تم تخطي '+skipped+' صف';
      if(coordsNotFound.size > 0) msg += '<br>كوردينتوريين غير معروفين: '+[...coordsNotFound].join(", ");
      msg += '</div></div>';
      if(statusEl) statusEl.innerHTML = msg;

      showToast("✓","تم استيراد "+saved+" قيمة");
      input.value = "";
    } catch(err){
      console.error("handleDailyImport error:", err);
      if(statusEl) statusEl.innerHTML = '<div style="background:var(--red-bg);color:var(--red2);padding:10px;border-radius:6px">❌ خطأ: '+err.message+'</div>';
      showToast("❌","خطأ في الاستيراد");
    }
  };
  reader.readAsArrayBuffer(file);
}
async function saveRRSettings(){
  if(!supa){showToast("❌","لا يوجد اتصال");return;}
  const btn=$("rr-save-btn");
  const statusEl=$("rr-save-status");
  if(btn){btn.disabled=true;btn.textContent="⏳ جاري الحفظ...";}

  // Collect current toggle states from DOM
  const updates=[];
  SALES_USERS.forEach(function(u){
    const chk=document.getElementById("rr-toggle-"+u.id);
    if(!chk)return;
    updates.push({id:u.id, name:u.name, inRotation:chk.checked});
  });

  console.log("[RR-Save] Attempting to save:", updates);

  try {
    // Update each user in Supabase + read back to verify
    let errors=[];
    let updated=[];
    let unchanged=[];

    for(const upd of updates){
      // Step 1: Update
      const {data:updData, error:updErr} = await supa
        .from("profiles")
        .update({in_rotation: upd.inRotation})
        .eq("id", upd.id)
        .select("id, name, in_rotation");

      if(updErr){
        console.error("[RR-Save] UPDATE failed for", upd.name, ":", updErr);
        errors.push(upd.name+": "+updErr.message);
        continue;
      }

      if(!updData || updData.length===0){
        console.warn("[RR-Save] UPDATE returned 0 rows for", upd.name, "— likely RLS blocking");
        errors.push(upd.name+": RLS denied (0 rows updated)");
        continue;
      }

      const actual = updData[0].in_rotation;
      console.log("[RR-Save] "+upd.name+": DB now =", actual, "expected =", upd.inRotation);

      if(actual === upd.inRotation){
        updated.push(upd);
      } else {
        unchanged.push(upd.name);
      }
    }

    if(errors.length>0){
      throw new Error(errors.join(" | "));
    }
    if(unchanged.length>0){
      throw new Error("القيم لم تتغير في DB لـ: "+unchanged.join(", "));
    }

    // Sync local USERS array
    updated.forEach(function(upd){
      const u=USERS.find(x=>x.id===upd.id);
      if(u){u.inRotation=upd.inRotation;u.rr=upd.inRotation;}
      const s=SALES_USERS.find(x=>x.id===upd.id);
      if(s){s.inRotation=upd.inRotation;s.rr=upd.inRotation;}
    });

    const onCount=updates.filter(x=>x.inRotation).length;
    const offCount=updates.filter(x=>!x.inRotation).length;

    if(statusEl){
      statusEl.style.display="block";
      statusEl.style.background="var(--green-bg)";
      statusEl.style.color="var(--green2)";
      statusEl.style.border="1px solid rgba(34,201,151,.3)";
      statusEl.textContent="✅ تم الحفظ والتحقق — "+onCount+" مفعّل · "+offCount+" موقوف";
      setTimeout(()=>{if(statusEl)statusEl.style.display="none";},4000);
    }
    showToast("✓","تم الحفظ ("+onCount+" مفعّل · "+offCount+" موقوف)");
  } catch(err){
    console.error("[RR-Save] FAILED:", err);
    if(statusEl){
      statusEl.style.display="block";
      statusEl.style.background="var(--red-bg)";
      statusEl.style.color="var(--red2)";
      statusEl.style.border="1px solid rgba(245,82,82,.3)";
      statusEl.innerHTML="❌ "+err.message+"<br><span style='font-size:11px;font-weight:400'>افتح Console (F12) لتفاصيل أكثر</span>";
    }
    showToast("❌","خطأ في الحفظ — راجع Console");
  } finally {
    if(btn){btn.disabled=false;btn.textContent="💾 حفظ الإعدادات";}
  }
}

// ═══ USERS MANAGEMENT — Save email, phone, job title for all users ═══
async function saveAllUsersInfo(){
  if(!supa){showToast("❌","لا يوجد اتصال");return;}
  if(curUser.role!=="admin"){showToast("⚠","غير مسموح");return;}
  const btn=$("users-save-btn");
  const statusEl=$("users-save-status");
  if(btn){btn.disabled=true;btn.textContent="⏳ جاري الحفظ...";}

  // Collect changes
  const updates=[];
  USERS.forEach(function(u){
    const emEl=document.getElementById("ue-"+u.id);
    const phEl=document.getElementById("up-"+u.id);
    const jtEl=document.getElementById("uj-"+u.id);
    if(!emEl)return;
    const newEmail=emEl.value.trim();
    const newPhone=phEl?phEl.value.trim():"";
    const newJob=jtEl?jtEl.value.trim():"";
    // Validate email format minimally
    if(newEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)){
      throw new Error("إيميل غير صحيح للمستخدم: "+u.name);
    }
    // Only push if changed
    if(newEmail!==(u.email||"") || newPhone!==(u.phone||"") || newJob!==(u.jobTitle||"")){
      updates.push({id:u.id, name:u.name, email:newEmail||null, phone:newPhone||null, job_title:newJob||null});
    }
  });

  if(updates.length===0){
    if(btn){btn.disabled=false;btn.textContent="💾 حفظ كل التغييرات";}
    showToast("ℹ","لا يوجد تغييرات لحفظها");
    return;
  }

  console.log("[Users] Saving updates:",updates);

  try {
    let saved=0;
    let errors=[];
    for(const upd of updates){
      const payload={email:upd.email, phone:upd.phone, job_title:upd.job_title};
      const {error}=await supa.from("profiles").update(payload).eq("id",upd.id);
      if(error){
        console.error("[Users] Failed for",upd.name,":",error);
        errors.push(upd.name+": "+error.message);
        continue;
      }
      // Sync local state
      const u=USERS.find(x=>x.id===upd.id);
      if(u){
        u.email=upd.email||"";
        u.phone=upd.phone||"";
        u.jobTitle=upd.job_title||"";
      }
      saved++;
    }
    if(errors.length>0){
      if(statusEl){
        statusEl.style.display="block";
        statusEl.style.background="var(--red-bg)";
        statusEl.style.color="var(--red2)";
        statusEl.innerHTML="❌ فشل حفظ "+errors.length+" مستخدم: "+errors.join(" | ").slice(0,200);
      }
    } else {
      if(statusEl){
        statusEl.style.display="block";
        statusEl.style.background="var(--green-bg)";
        statusEl.style.color="var(--green2)";
        statusEl.textContent="✅ تم حفظ "+saved+" مستخدم بنجاح";
        setTimeout(()=>{if(statusEl)statusEl.style.display="none";},4000);
      }
      showToast("✓","تم حفظ "+saved+" مستخدم");
    }
  } catch(err){
    console.error("saveAllUsersInfo error:",err);
    if(statusEl){
      statusEl.style.display="block";
      statusEl.style.background="var(--red-bg)";
      statusEl.style.color="var(--red2)";
      statusEl.textContent="❌ خطأ: "+err.message;
    }
    showToast("❌","خطأ: "+err.message);
  } finally {
    if(btn){btn.disabled=false;btn.textContent="💾 حفظ كل التغييرات";}
  }
}

async function handleExcelImport(input){
  const file=input.files[0];if(!file)return;
  if(!supa){showToast("❌","لا يوجد اتصال بالسيرفر");return;}
  showToast("⏳","جاري قراءة الملف...");
  
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
      if(!rows.length){showToast("❌","الملف فارغ");return;}
      
      const colMap={
        "المصدر":"src","Source":"src","Channel":"src",
        "رقم الإعلان":"ad_num","رقم الاعلان":"ad_num","Ad Number":"ad_num","Ad ID":"ad_num",
        "تاريخ التسجيل":"dt","Date":"dt",
        "وقت التسجيل":"tm","Time":"tm",
        "اسم العميل":"nm","Name":"nm",
        "شركة العميل":"company","Company":"company","الشركة":"company",
        "الموبايل":"mob","Mobile":"mob","Phone":"mob",
        "الجنسية":"nat",
        "بلد الاستيراد":"imp",
        "بلد التصدير":"exp",
        "مجال التخصص":"spec",
        "المنتج المطلوب":"prod",
        "الكمية":"qty","الوحدة":"unit",
        "رأس المال":"cap","Capital":"cap",
        "مستورد/مصدر":"ie","مستورد / مصدر":"ie",
        "توفر المورد":"sup",
        "الخدمات المطلوبة":"svc","Services":"svc",
        "الأولوية":"priority",
        "Coordinator":"by","مدخل البيانات":"by",
        "Sales Rep":"rep","فريق المبيعات":"rep",
        "الحالة":"st",
        "تاريخ أول اتصال":"fcd","تاريخ اول اتصال":"fcd",
        "وقت أول اتصال":"fct","وقت اول اتصال":"fct",
        "نتيجة أول مكالمة":"c1","نتيجة اول مكالمة":"c1",
        "نتيجة ثاني مكالمة":"c2","نتيجة ثانى مكالمة":"c2",
        "نتيجة ثالث مكالمة":"c3",
        "تاريخ آخر مكالمة":"lcd","تاريخ اخر مكالمة":"lcd",
        "سبب الإلغاء":"cr","سبب الالغاء":"cr",
        "Reactivated":"reactivated","مسترد":"reactivated"
      };
      const stMap={
        "لاغى":"لاغي","لاغي":"لاغي",
        "تحت المتابعة":"تحت المتابعة",
        "لم يتم الرد":"لم يتم الرد",
        "عميل فعلى":"عميل فعلي","عميل فعلي":"عميل فعلي",
        "":""
      };
      
      const batch = [];
      let skipped = 0;
      let rrIdx = 0;
      
      for(const row of rows){
        const lead = {};
        Object.keys(row).forEach(k => {
          const tk = String(k||"").trim();
          if(colMap[tk]){
            const v = row[k];
            if(v instanceof Date){
              const fld = colMap[tk];
              if(["dt","fcd","lcd"].includes(fld)){
                lead[fld] = v.toISOString().slice(0,10);
              } else if(["tm","fct"].includes(fld)){
                lead[fld] = String(v.getHours()).padStart(2,"0")+":"+String(v.getMinutes()).padStart(2,"0");
              } else {
                lead[fld] = String(v).trim();
              }
            } else {
              lead[colMap[tk]] = String(v||"").trim();
            }
          }
        });
        
        if(!lead.nm || !lead.src){skipped++; continue;}
        
        // Find coord
        let coord = null;
        if(lead.by){
          coord = USERS.find(u=>u.role==="coordinator" && u.name.toLowerCase()===lead.by.trim().toLowerCase());
        }
        if(!coord) coord = curUser.role==="coordinator"?curUser:COORD_USERS[0];
        
        // Find sales rep
        let rep = null;
        if(lead.rep){
          rep = USERS.find(u=>u.role==="sales" && u.name.toLowerCase()===lead.rep.trim().toLowerCase());
        }
        if(!rep){
          rep = SALES_USERS[rrIdx % SALES_USERS.length];
          rrIdx++;
        }
        
        const svcArr = lead.svc ? lead.svc.split(/[،,]/).map(s=>s.trim()).filter(Boolean) : [];
        const mappedSt = stMap[lead.st]!==undefined ? stMap[lead.st] : (lead.st||"");
        
        batch.push({
          cc: "CLT-"+Date.now()+"-"+batch.length,
          by_id: coord.id, by_name: coord.name,
          rep_id: rep.id, rep_name: rep.name,
          src: lead.src,
          ad_num: lead.ad_num||"",
          dt: lead.dt || today(),
          tm: lead.tm || nowTime(),
          nm: lead.nm, company: lead.company||"", mob: lead.mob||"",
          nat: lead.nat||"مصر",
          imp: lead.imp||"مصر",
          exp: lead.exp||"الصين",
          spec: lead.spec||"اخرى",
          prod: lead.prod||"",
          qty: lead.qty||"", unit: lead.unit||"",
          cap: lead.cap||"",
          ie: lead.ie||"يرغب في الاستيراد",
          sup: lead.sup||"غير متوفر",
          svc: svcArr,
          priority: lead.priority||"عادي",
          fcd: lead.fcd||null,
          fct: lead.fct||null,
          c1: lead.c1||"",
          c2: lead.c2||"",
          c3: lead.c3||"",
          lcd: lead.lcd||null,
          st: mappedSt,
          cr: lead.cr||"",
          reactivated: lead.reactivated||""
        });
      }
      
      // Insert in chunks of 200 to avoid timeout
      const CHUNK_SIZE = 200;
      let added = 0;
      for(let i=0; i<batch.length; i+=CHUNK_SIZE){
        const chunk = batch.slice(i, i+CHUNK_SIZE);
        showToast("⏳", "جاري رفع... " + (i+chunk.length) + "/" + batch.length);
        const {error} = await supa.from("leads").insert(chunk);
        if(error){console.error(error); throw error;}
        added += chunk.length;
      }
      
      showToast("✓", "تم استيراد "+added+" Lead" + (skipped>0?" (تخطي "+skipped+")":""));
      input.value="";
      
      // Reload
      await loadAllData();
      if($("pg-leads")&&$("pg-leads").classList.contains("active"))renderLeadsContent();
      if($("pg-dashboard")&&$("pg-dashboard").classList.contains("active"))renderDash();
      renderSettings();
    } catch(err){
      console.error(err);
      showToast("❌","خطأ: "+err.message.slice(0,80));
    }
  };
  reader.readAsArrayBuffer(file);
}


// Auto-restore session on page load — placed at end so all functions are defined
async function attemptSessionRestore(){
  console.log("[Auth] Attempting session restore...");
  
  // Wait for supa to be initialized (up to 5 seconds)
  let waitCount = 0;
  while(!supa && waitCount < 50){
    await new Promise(r => setTimeout(r, 100));
    waitCount++;
  }
  
  if(!supa) {
    console.error("[Auth] Supabase client not initialized after 5s — showing login");
    const splash = document.getElementById("loading-splash");
    if(splash) splash.style.display = "none";
    const login = document.getElementById("login-page");
    if(login) login.style.display = "";
    return;
  }
  
  console.log("[Auth] Checking for existing session...");
  try {
    const {data, error} = await supa.auth.getSession();
    if(error) {
      console.error("[Auth] Session check error:", error);
      return;
    }
    if(!data || !data.session){
      console.log("[Auth] No session found, showing login");
      // Hide splash, show login
      const splash = document.getElementById("loading-splash");
      if(splash) splash.style.display = "none";
      const login = document.getElementById("login-page");
      if(login) login.style.display = "";
      return;
    }
    
    console.log("[Auth] Found existing session, restoring user:", data.session.user.email);
    supaSession = data.session;
    
    // Fetch profile — retry once if it fails (could be network blip)
    let profile = null;
    let perr = null;
    for(let attempt = 0; attempt < 2; attempt++){
      const res = await supa.from("profiles").select("*").eq("id", data.session.user.id).single();
      if(res.data){ profile = res.data; break; }
      perr = res.error;
      if(attempt === 0) await new Promise(r => setTimeout(r, 500));
    }
    
    if(!profile) {
      console.warn("[Auth] No profile after retry — keeping session, asking user to retry:", perr);
      // DON'T sign out — could be temporary network issue
      // Just show login page so user can try again
      return;
    }
    
    curUser = {
      id: profile.id, name: profile.name, email: profile.email, role: profile.role,
      av: profile.name.split(" ").map(s=>s[0]).join("").slice(0,2).toUpperCase(),
      clr: profile.role==="admin"?"var(--purple2)":profile.role==="coordinator"?"var(--green2)":"var(--orange2)",
      bg: profile.role==="admin"?"var(--admin-bg)":profile.role==="coordinator"?"var(--coord-bg)":"var(--sales-bg)"
    };
    console.log("[Auth] ✓ Restored user:", curUser.name, "role:", curUser.role);
    
    try {
      await loadAllData();
      console.log("[Auth] ✓ Data loaded");
    } catch(e) {
      console.error("[Auth] loadAllData failed during restore:", e);
    }
    try {
      initApp();
      console.log("[Auth] ✓ App initialized");
    } catch(e) {
      console.error("[Auth] initApp failed during restore:", e);
    }
  } catch(err) {
    console.error("[Auth] Restore failed:", err);
    // On error, hide splash and show login
    const splash = document.getElementById("loading-splash");
    if(splash) splash.style.display = "none";
    const login = document.getElementById("login-page");
    if(login) login.style.display = "";
  }
}

window.addEventListener("DOMContentLoaded", () => {
  console.log("[Auth] DOMContentLoaded fired");
  attemptSessionRestore();
});
